<!-- GENERATED by scripts/build.py from fitting-room.template.html + data.json. Do not hand-edit this file — edit the template or data.json, then rerun build.py. -->
<title>__TITLE__</title>
<style>
  /* Light-only by design — this is a quick phone reference, not a dashboard. Warm off-white, never stark. */
  :root, :root[data-theme="light"], :root[data-theme="dark"]{
    --bg:#f2efe9; --surface:#faf7f1; --card:#fdfbf6; --text:#2c2822; --muted:#726d64;
    --border:#e5e0d6; --border-strong:#d6cfc3; --accent:#3d5a80;
    --chip:#ece8e0; --chip-on:#2c2822; --chip-on-ink:#f2efe9;
    --fit-small:#bb4e39; --fit-ok:#2d7853; --fit-big:#48659f;
    --fit-small-bg:#f6e6e0; --fit-ok-bg:#e2efe8; --fit-big-bg:#e6eaf4;
    --shadow:0 1px 2px rgba(40,36,30,.05),0 5px 16px rgba(40,36,30,.05);
    --radius:14px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
    color-scheme:light;
  }
  /* Want a different accent colour? See README.md → "Change the accent colour" for
     ready-to-paste presets. Only --accent needs to change; --fit-* stay put, they're
     a small/ok/big traffic-light and changing them would break that convention. */

  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    line-height:1.5;-webkit-text-size-adjust:100%;
  }
  /* Tuned for modern phone widths (~390-430pt) — this is meant to live on your home screen. */
  .wrap{max-width:460px;margin:0 auto;padding:0 14px calc(40px + var(--safe-bottom))}
  .tnum{font-variant-numeric:tabular-nums}

  header.top{
    position:sticky;top:0;z-index:20;background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:calc(14px + var(--safe-top)) 16px 12px;
  }
  .top-inner{max-width:460px;margin:0 auto;display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:23px;margin:0;letter-spacing:.01em;font-weight:600}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .ro-col{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none}
  .ro-tag{font-size:11px;color:var(--muted);white-space:nowrap;border:1px solid var(--border);border-radius:999px;padding:4px 10px;text-align:right;line-height:1.35}
  .unit-toggle{display:inline-flex;border:1px solid var(--border-strong);border-radius:999px;overflow:hidden;background:var(--chip)}
  .unit-toggle button{
    border:0;background:transparent;color:var(--muted);font:inherit;font-size:11px;
    padding:3px 11px;cursor:pointer;line-height:1.35;transition:background .12s,color .12s;
  }
  .unit-toggle button[aria-pressed="true"]{background:var(--chip-on);color:var(--chip-on-ink)}
  .unit-toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

  .tools{display:flex;flex-direction:column;gap:9px;padding-top:12px}
  .chips{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;padding-bottom:2px}
  .chips:empty{display:none}
  .chip{
    border:1px solid var(--border-strong);background:var(--chip);color:var(--text);
    border-radius:999px;padding:9px 6px;font-size:13px;cursor:pointer;white-space:nowrap;
    min-height:40px;display:flex;align-items:center;justify-content:center;gap:5px;
    transition:background .12s,color .12s,border-color .12s;
  }
  .chip[aria-pressed="true"]{background:var(--chip-on);color:var(--chip-on-ink);border-color:var(--chip-on)}
  .chip .n{font-size:12px;opacity:.7}
  .chip:focus-visible,.search:focus-visible,.tile-link:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .search{
    width:100%;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);
    border-radius:10px;padding:12px 14px;font-size:16px; /* 16px stops iOS zoom-on-focus */
  }

  .count{color:var(--muted);font-size:12px;margin:14px 2px 10px}

  /* ---- size-range strip (per-category, shows when a category chip is active) ---- */
  .range-strip{
    margin:12px 0 0;background:var(--surface);border:1px dashed var(--border-strong);
    border-radius:10px;padding:9px 12px;font-size:12.5px;color:var(--muted);line-height:1.7;
  }
  .range-strip b{color:var(--text);font-weight:600;margin-left:3px}

  /* ---- list rows (thumbnail on the left) ---- */
  .list{display:flex;flex-direction:column;gap:10px}
  .card{
    display:flex;gap:11px;align-items:center;background:var(--card);border:1px solid var(--border);
    border-radius:12px;box-shadow:var(--shadow);padding:10px 11px;
  }
  .thumb,.thumb-ph{width:60px;height:60px;flex:none;border-radius:9px;background:var(--chip);border:1px solid var(--border)}
  .thumb{object-fit:cover;display:block}
  .thumb-ph{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;font-family:Georgia,serif;text-align:center;padding:2px}
  .card-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .product-title{font-size:14px;font-weight:600;line-height:1.22;text-wrap:balance}
  .fit-badge{font-size:12px;font-weight:700;border-radius:7px;padding:2px 9px;display:inline-flex;align-items:center;gap:5px;flex:none;white-space:nowrap}
  .fit-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .fit-small{color:var(--fit-small);background:var(--fit-small-bg)}
  .fit-ok{color:var(--fit-ok);background:var(--fit-ok-bg)}
  .fit-big{color:var(--fit-big);background:var(--fit-big-bg)}
  .brand-line{font-size:12px;color:var(--muted)}
  .season-chip{display:inline-flex;align-items:center;gap:4px;align-self:flex-start;font-size:11px;background:var(--chip);border:1px solid var(--border);border-radius:6px;padding:1px 7px;color:var(--muted)}
  .measures{display:flex;flex-wrap:wrap;gap:2px 12px;font-size:12.5px;margin-top:1px}
  .measures .m b{color:var(--muted);font-weight:500;margin-right:3px}
  .material{font-size:11px;color:var(--muted);line-height:1.4}
  .material::before{content:"◇ ";opacity:.6}
  .card-notes{font-size:11.5px;color:var(--fit-ok);white-space:pre-wrap;line-height:1.45}
  .card-foot{display:flex;gap:5px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--muted);margin-top:1px}
  .card-foot .sep{opacity:.5}
  .tile-link{color:var(--accent);text-decoration:none}

  .empty{text-align:center;color:var(--muted);padding:56px 20px;font-size:14px}
  .footnote{margin-top:26px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6}
</style>

<header class="top">
  <div class="top-inner">
    <div>
      <h1>__TITLE__</h1>
      <div class="sub">__SUBTITLE__</div>
    </div>
    <div class="ro-col">
      <div class="ro-tag">__UPDATED_LABEL__<span class="tnum" id="updated"></span></div>
      <div class="unit-toggle" id="unitToggle" role="group" aria-label="Measurement unit">
        <button type="button" data-unit="cm" aria-pressed="true">cm</button><button type="button" data-unit="in" aria-pressed="false">in</button>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="tools">
    <div class="chips" id="catChips"></div>
    <div class="chips" id="seasonChips"></div>
    <input class="search" id="search" type="search" placeholder="__SEARCH_PH__" autocomplete="off">
  </div>

  <div id="rangeStrip"></div>
  <div class="count" id="count"></div>
  <div class="list" id="grid"></div>
</div>

<script>
"use strict";
// Assembled by scripts/build.py from data.json (+ photos/ inlined as base64, since the
// Claude Artifact CSP blocks remote images). Do not hand-edit this file — edit data.json.
var DATA = __DATA_JSON__;
var PHOTOS = __PHOTOS_JSON__;

(function(){
  // ---- UI copy: every user-facing string lives in data.json → ui, with an English
  // fallback here so the page still renders sensibly even if a key is missing. ----
  var UI = DATA.ui || {};
  var T = {
    emptyState: UI.emptyState || "No matches. Try a different filter, or add more items later.",
    countTemplate: UI.countTemplate || "{n} items",
    countTotalTemplate: UI.countTotalTemplate || "({total} total)",
    rangeLabel: UI.rangeLabel || "📏 Size range: ",
    unitToggleAriaLabel: UI.unitToggleAriaLabel || "Measurement unit",
    unnamedLabel: UI.unnamedLabel || "(untitled)",
    sizeLabel: UI.sizeLabel || "Size: ",
    linkLabel: UI.linkLabel || "Link ↗"
  };
  document.getElementById("unitToggle").setAttribute("aria-label", T.unitToggleAriaLabel);

  var CATS = {};        // key -> category object
  var CAT_ORDER = [];
  DATA.categories.forEach(function(c){ CATS[c.key]=c; CAT_ORDER.push(c.key); });
  var SEASONS = {};     // key -> {emoji,label,temp}
  var SEASON_ORDER = [];
  DATA.seasons.forEach(function(s){ SEASONS[s.key]=s; SEASON_ORDER.push(s.key); });
  var RECORDS = DATA.records;

  document.getElementById("updated").textContent = DATA.updated || "";

  var filterCat = "all", filterSeason = "all", query = "";

  // Measurement unit. Source values are always cm; inches are display-only,
  // rounded to the nearest 0.5 (size-chart convention). Choice persists.
  var unit = "cm";
  try{ if(localStorage.getItem("fr-unit")==="in") unit = "in"; }catch(e){}

  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  function visible(){
    var q = query.trim().toLowerCase();
    return RECORDS.filter(function(r){
      if(filterCat!=="all" && r.cat!==filterCat) return false;
      if(filterSeason!=="all" && r.season!==filterSeason) return false;
      if(q){
        var hay = (r.brand+" "+r.product+" "+r.notes+" "+r.size+" "+r.colour+" "+(r.material||"")).toLowerCase();
        if(hay.indexOf(q)<0) return false;
      }
      return true;
    });
  }

  function renderChips(){
    var cc = document.getElementById("catChips");
    var html = "";
    CAT_ORDER.forEach(function(k){
      var c = CATS[k];
      var n = RECORDS.filter(function(r){ return r.cat===k; }).length;
      // A category stays visible even when empty if data.json sets "alwaysShow": true
      // on it (e.g. a category you always want to see as a reminder to fill in).
      if(!n && !c.alwaysShow) return;
      html += '<button class="chip" data-cat="'+k+'" aria-pressed="'+(filterCat===k)+'">'+
              esc(c.label)+(n?' <span class="n tnum">'+n+'</span>':'')+'</button>';
    });
    cc.innerHTML = html;

    var sc = document.getElementById("seasonChips");
    var sh = "";
    SEASON_ORDER.forEach(function(k){
      var n = RECORDS.filter(function(r){ return r.season===k; }).length;
      if(!n) return;
      var s = SEASONS[k];
      sh += '<button class="chip season" data-season="'+k+'" aria-pressed="'+(filterSeason===k)+'">'+
            s.emoji+' '+esc(s.label)+' <span class="n tnum">'+n+'</span></button>';
    });
    sc.innerHTML = sh;
  }

  // ---- size-range strip: MANUAL, from each category's "range" field in data.json ----
  // We don't auto-derive this from records: an "ok" size-chart span mixes garment
  // intents (roomy jacket vs slim hoodie vs skin-tight baselayer), so a computed span
  // would mislead. You curate these numbers by hand; nothing calculates them for you.
  // "range" shares the measures shape ([["Bust","87-99"], …], values in cm) so the
  // cm/in toggle converts it like any card measure.
  function parseSpan(v){
    var m = String(v).match(/^\s*(\d+(?:\.\d+)?)\s*(?:[-–~]\s*(\d+(?:\.\d+)?))?\s*$/);
    if(!m) return null;
    var lo = parseFloat(m[1]), hi = m[2] ? parseFloat(m[2]) : lo;
    return [Math.min(lo,hi), Math.max(lo,hi)];
  }
  function fmtN(x){ return String(Math.round(x*10)/10); }
  function cmToIn(x){ return Math.round(x/2.54*2)/2; } // nearest 0.5″
  function fmtSpan(lo, hi){
    if(unit==="in"){ lo = cmToIn(lo); hi = cmToIn(hi); }
    return lo===hi ? fmtN(lo) : fmtN(lo)+"–"+fmtN(hi);
  }
  function fmtVal(v){ // a raw measure value in the current unit; non-numeric text passes through
    var span = parseSpan(v);
    return span ? fmtSpan(span[0], span[1]) : String(v);
  }

  function renderRange(){
    var el = document.getElementById("rangeStrip");
    if(filterCat==="all"){ el.innerHTML=""; return; }
    var catObj = CATS[filterCat];
    var html = "";
    if(catObj && catObj.range && catObj.range.length){
      var parts = catObj.range.map(function(m){
        return esc(m[0])+'<b class="tnum">'+esc(fmtVal(m[1]))+'</b>';
      });
      html += '<div class="range-strip">'+esc(T.rangeLabel)+parts.join(' · ')+'</div>';
    }
    if(catObj && catObj.rangeNote) html += '<div class="range-strip">✍️ '+esc(catObj.rangeNote)+'</div>';
    el.innerHTML = html;
  }

  function measuresHtml(r){
    if(!r.measures || !r.measures.length) return "";
    return '<div class="measures">'+r.measures.map(function(m){
      return '<span class="m"><b>'+esc(m[0])+'</b><span class="tnum">'+esc(fmtVal(m[1]))+'</span></span>';
    }).join("")+'</div>';
  }

  function seasonChipHtml(r){
    if(!r.season || !SEASONS[r.season]) return "";
    var s = SEASONS[r.season];
    return '<span class="season-chip">'+s.emoji+' '+esc(s.label)+' <span class="tnum">'+esc(s.temp)+'</span></span>';
  }

  // fit ∈ small | ok | big — three levels only; nuance belongs in notes.
  // Display labels are configurable via data.json → ui.fitLabels (see README presets),
  // so the same three internal keys work for any UI language.
  var FIT_LABEL = {
    small: (UI.fitLabels && UI.fitLabels.small) || "Too small",
    ok:    (UI.fitLabels && UI.fitLabels.ok)    || "Just right",
    big:   (UI.fitLabels && UI.fitLabels.big)   || "Too big"
  };

  function cardHtml(r){
    var photo = PHOTOS[r.sku] || "";
    var media = photo
      ? '<img class="thumb" src="'+photo+'" alt="'+esc(r.product)+'" loading="lazy">'
      : '<div class="thumb-ph">'+esc(CATS[r.cat] ? CATS[r.cat].label : "")+'</div>';

    var brandBits = [esc(r.brand)];
    if(r.colour) brandBits.push(esc(r.colour));
    if(r.size) brandBits.push(esc(T.sizeLabel)+esc(r.size));

    var foot=[];
    if(r.date) foot.push('<span class="tnum">'+esc(r.date)+'</span>');
    if(r.price) foot.push('<span class="tnum">$'+esc(r.price)+'</span>');
    if(r.sku) foot.push('SKU '+esc(r.sku));
    if(r.link) foot.push('<a class="tile-link" href="'+esc(r.link)+'" target="_blank" rel="noopener">'+esc(T.linkLabel)+'</a>');
    var footHtml = foot.length ? '<div class="card-foot">'+foot.join('<span class="sep">·</span>')+'</div>' : '';

    var fitKey = (r.fit==="small"||r.fit==="ok"||r.fit==="big") ? r.fit : "ok";
    return '<div class="card">'+media+
      '<div class="card-content">'+
        '<div class="row1">'+
          '<span class="product-title">'+esc(r.product||T.unnamedLabel)+'</span>'+
          '<span class="fit-badge fit-'+fitKey+'">'+esc(FIT_LABEL[fitKey])+'</span>'+
        '</div>'+
        '<div class="brand-line">'+brandBits.join(" · ")+'</div>'+
        seasonChipHtml(r)+
        measuresHtml(r)+
        (r.material?'<div class="material">'+esc(r.material)+'</div>':'')+
        (r.notes?'<div class="card-notes">'+esc(r.notes)+'</div>':'')+
        footHtml+
      '</div>'+
    '</div>';
  }

  function render(){
    renderChips();
    renderRange();
    var v = visible();
    var countHtml = T.countTemplate.replace("{n}", v.length);
    if(v.length!==RECORDS.length) countHtml += " " + T.countTotalTemplate.replace("{total}", RECORDS.length);
    document.getElementById("count").textContent = countHtml;
    var grid = document.getElementById("grid");
    if(!v.length){
      grid.innerHTML = '<div class="empty">'+esc(T.emptyState)+'</div>';
      return;
    }
    v.sort(function(a,b){
      var ci = CAT_ORDER.indexOf(a.cat)-CAT_ORDER.indexOf(b.cat);
      if(ci) return ci;
      var bi = (a.brand||"").localeCompare(b.brand||"");
      if(bi) return bi;
      return (b.date||"").localeCompare(a.date||"");
    });
    grid.innerHTML = v.map(cardHtml).join("");
  }

  document.getElementById("catChips").addEventListener("click", function(e){
    var b=e.target.closest(".chip"); if(!b) return;
    var k=b.getAttribute("data-cat");
    filterCat = (filterCat===k) ? "all" : k;
    render();
  });
  document.getElementById("seasonChips").addEventListener("click", function(e){
    var b=e.target.closest(".chip"); if(!b) return;
    var k=b.getAttribute("data-season");
    filterSeason = (filterSeason===k) ? "all" : k;
    render();
  });
  document.getElementById("search").addEventListener("input", function(e){
    query=e.target.value; render();
  });

  function syncUnitToggle(){
    var btns = document.getElementById("unitToggle").querySelectorAll("button");
    for(var i=0;i<btns.length;i++)
      btns[i].setAttribute("aria-pressed", String(btns[i].getAttribute("data-unit")===unit));
  }
  document.getElementById("unitToggle").addEventListener("click", function(e){
    var b=e.target.closest("button"); if(!b) return;
    unit = b.getAttribute("data-unit")==="in" ? "in" : "cm";
    try{ localStorage.setItem("fr-unit", unit); }catch(e2){}
    syncUnitToggle(); render();
  });

  syncUnitToggle();
  render();
})();
</script>
