<!-- GENERATED by scripts/build.py from staging-room.template.html + data.json. Do not hand-edit the built file — edit the template or data.json, then rerun build.py. -->
<title>__TITLE__</title>
<style>
  /* Sibling tool to fitting-room: same warm light-only family, its own "packed" accent.
     Locked light in both theme states — this is a phone-in-hand packing list. */
  :root, :root[data-theme="light"], :root[data-theme="dark"]{
    --bg:#f2efe9; --surface:#faf7f1; --card:#fdfbf6; --text:#2c2822; --muted:#726d64;
    --border:#e5e0d6; --border-strong:#d6cfc3;
    --accent:#2e6b4f; --accent-bg:#e2efe8; --accent-ink:#f2efe9;
    --chip:#ece8e0; --chip-on:#2c2822; --chip-on-ink:#f2efe9;
    --shadow:0 1px 2px rgba(40,36,30,.05),0 5px 16px rgba(40,36,30,.05);
    --radius:14px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
    color-scheme:light;
  }
  /* Want a different accent colour? See README.md → "Change the accent colour" for
     ready-to-paste presets (--accent / --accent-bg / --accent-ink move together). */

  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    line-height:1.5;-webkit-text-size-adjust:100%;
  }
  /* Tuned for modern phone widths (~390-430pt) — this is meant to live on your home screen. */
  .wrap{max-width:460px;margin:0 auto;padding:0 14px calc(44px + var(--safe-bottom))}
  .tnum{font-variant-numeric:tabular-nums}
  button{font:inherit}

  header.top{
    position:sticky;top:0;z-index:20;background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:calc(14px + var(--safe-top)) 16px 10px;
  }
  .top-inner{max-width:460px;margin:0 auto}
  .top-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:23px;margin:0;letter-spacing:.01em;font-weight:600}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .ro-col{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none}
  .ro-tag{font-size:11px;color:var(--muted);white-space:nowrap;border:1px solid var(--border);border-radius:999px;padding:4px 10px;line-height:1.35}
  .reset-btn{
    border:1px solid var(--border-strong);background:var(--chip);color:var(--muted);
    border-radius:999px;padding:3px 11px;font-size:11px;cursor:pointer;line-height:1.35;
  }
  .reset-btn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

  /* packing progress — the header's one glanceable number */
  .progress{display:flex;align-items:center;gap:10px;margin-top:10px}
  .bar{flex:1;height:6px;border-radius:999px;background:var(--chip);overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--accent);border-radius:999px;transition:width .25s ease}
  .progress .label{font-size:12px;color:var(--muted);white-space:nowrap}
  .progress .label b{color:var(--accent);font-weight:700}
  @media (prefers-reduced-motion:reduce){ .bar i{transition:none} }

  .tools{display:flex;flex-direction:column;gap:9px;padding-top:12px}
  .mod-caption{font-size:11px;color:var(--muted);letter-spacing:.06em;margin:2px 2px -3px}
  .chips{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
  .chip{
    border:1px solid var(--border-strong);background:var(--chip);color:var(--text);
    border-radius:999px;padding:9px 6px;font-size:13px;cursor:pointer;white-space:nowrap;
    min-height:40px;display:flex;align-items:center;justify-content:center;gap:5px;
    transition:background .12s,color .12s,border-color .12s;
  }
  .chip[aria-pressed="true"]{background:var(--chip-on);color:var(--chip-on-ink);border-color:var(--chip-on)}
  .chip .n{font-size:12px;opacity:.7}
  .chip:focus-visible,.search:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .search{
    width:100%;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);
    border-radius:10px;padding:12px 14px;font-size:16px; /* 16px stops iOS zoom-on-focus */
  }

  /* ---- sections & groups ---- */
  .section{margin-top:22px}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin:0 2px 4px}
  .sec-title{font-family:Georgia,"Times New Roman",serif;font-size:17px;font-weight:600}
  .sec-count{font-size:12px;color:var(--muted)}
  .sec-count.done{color:var(--accent);font-weight:700}
  .sec-desc{font-size:12px;color:var(--muted);line-height:1.55;margin:0 2px 8px}

  .group{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:10px;overflow:hidden}
  .group-head{
    display:flex;align-items:center;gap:9px;padding:9px 12px;
    background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;
  }
  .group-title{flex:1;font-size:13px;font-weight:700;letter-spacing:.02em}
  .group-count{font-size:11px;color:var(--muted)}
  .group-count.done{color:var(--accent);font-weight:700}

  .item{display:flex;gap:10px;padding:9px 12px;align-items:flex-start;cursor:pointer;border-top:1px solid var(--border)}
  .item:first-of-type{border-top:0}
  .item-body{flex:1;min-width:0}
  .item-line{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .item-name{font-size:14px;line-height:1.35}
  .item-qty{font-size:11.5px;color:var(--accent);background:var(--accent-bg);border-radius:6px;padding:0 7px;white-space:nowrap}
  .item-mod{font-size:10.5px;color:var(--muted);background:var(--chip);border:1px solid var(--border);border-radius:6px;padding:0 6px;white-space:nowrap}
  .item-notes{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:1px;white-space:pre-wrap}
  .item-specs{display:flex;flex-wrap:wrap;gap:3px 12px;font-size:12px;margin-top:2px}
  .item-specs b{color:var(--muted);font-weight:500;margin-right:4px}

  /* checkboxes — packing state lives here (localStorage only, per device) */
  .cb{
    flex:none;width:22px;height:22px;border-radius:7px;margin-top:1px;
    border:1.5px solid var(--border-strong);background:var(--surface);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;line-height:1;color:transparent;transition:background .12s,border-color .12s;
  }
  .item.checked .cb{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .item.checked .item-name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border-strong)}
  .item.checked .item-qty{opacity:.55}
  .group-head .cb{border-radius:6px}
  .group-head.all .cb{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .group-head.some .cb{color:var(--accent)}

  .hint-strip{
    margin-top:10px;background:var(--surface);border:1px dashed var(--border-strong);
    border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--muted);line-height:1.6;
  }
  .empty{text-align:center;color:var(--muted);padding:56px 20px;font-size:14px}
</style>

<header class="top">
  <div class="top-inner">
    <div class="top-row">
      <div>
        <h1>__TITLE__</h1>
        <div class="sub">__SUBTITLE__</div>
      </div>
      <div class="ro-col">
        <div class="ro-tag">__UPDATED_LABEL__<span class="tnum" id="updated"></span></div>
        <button type="button" class="reset-btn" id="resetBtn"></button>
      </div>
    </div>
    <div class="progress" id="progressWrap">
      <div class="bar"><i id="barFill"></i></div>
      <div class="label" id="progLabel"></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="tools">
    <div class="mod-caption" id="modCaption"></div>
    <div class="chips" id="modChips"></div>
    <input class="search" id="search" type="search" placeholder="__SEARCH_PH__" autocomplete="off">
  </div>
  <div id="list"></div>
</div>

<script>
"use strict";
// Assembled by scripts/build.py from data.json. Do not hand-edit the built file.
var DATA = __DATA_JSON__;

(function(){
  // ---- UI copy: every user-facing string lives in data.json → ui, with an English
  // fallback here so the page still renders sensibly even if a key is missing. ----
  var UI = DATA.ui || {};
  var T = {
    resetBtnLabel: UI.resetBtnLabel || "↺ Reset checks",
    resetConfirm: UI.resetConfirm || "Clear all checks and start a new trip? (Your module choices are kept.)",
    modCaption: UI.modCaption || "🎯 Situational modules — tap to add to this trip",
    progressAriaLabel: UI.progressAriaLabel || "Packing progress",
    progressTemplate: UI.progressTemplate || 'Packed <b class="tnum">{done}</b><span class="tnum">/{total}</span>',
    progressDoneLabel: UI.progressDoneLabel || "🎉 <b>All packed!</b>",
    emptyState: UI.emptyState || "No matching items. Try a different search, or add more later.",
    selectAllAriaPrefix: UI.selectAllAriaPrefix || "Select all: "
  };
  document.getElementById("resetBtn").textContent = T.resetBtnLabel;
  document.getElementById("modCaption").textContent = T.modCaption;
  document.getElementById("progressWrap").setAttribute("aria-label", T.progressAriaLabel);

  var SECTIONS = DATA.sections;
  var MODULES = {};                       // key -> {emoji,label}
  var MOD_ORDER = [];
  DATA.modules.forEach(function(m){ MODULES[m.key]=m; MOD_ORDER.push(m.key); });
  var ITEMS = DATA.items;

  document.getElementById("updated").textContent = DATA.updated || "";

  // Stable per-item id: survives reordering/insertion in data.json.
  // Renaming an item resets its check state — acceptable, documented in the skill.
  ITEMS.forEach(function(it){
    it.id = it.sec + "|" + (it.module ? "m:"+it.module : it.group) + "|" + it.name;
  });

  // ---- persisted state: checks + active modules (device-local by design) ----
  var checked = {}, activeMods = {};
  try{ checked = JSON.parse(localStorage.getItem("sr-checked")||"{}") || {}; }catch(e){}
  try{
    (JSON.parse(localStorage.getItem("sr-mods")||"[]")||[]).forEach(function(k){
      if(MODULES[k]) activeMods[k]=true;
    });
  }catch(e){}
  function saveChecked(){ try{ localStorage.setItem("sr-checked", JSON.stringify(checked)); }catch(e){} }
  function saveMods(){
    try{ localStorage.setItem("sr-mods", JSON.stringify(Object.keys(activeMods))); }catch(e){}
  }

  var query = "";

  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  function matches(it, q){
    var hay = (it.name+" "+(it.notes||"")+" "+(it.group||"")+" "+(it.qty||"")+
               (it.module&&MODULES[it.module]?" "+MODULES[it.module].label:"")).toLowerCase();
    return hay.indexOf(q)>=0;
  }

  // An item is "in this trip's list" if it's core, or its module is switched on.
  // While searching, module gating is bypassed so the whole toolbox is findable.
  function visibleItems(){
    var q = query.trim().toLowerCase();
    return ITEMS.filter(function(it){
      if(q) return matches(it, q);
      return !it.module || activeMods[it.module];
    });
  }

  function itemHtml(it, showMod){
    var isC = !!checked[it.id];
    var specs = "";
    if(it.specs && it.specs.length){
      specs = '<div class="item-specs">'+it.specs.map(function(s){
        return '<span><b>'+esc(s[0])+'</b><span class="tnum">'+esc(s[1])+'</span></span>';
      }).join("")+'</div>';
    }
    var mod = (showMod && it.module && MODULES[it.module])
      ? '<span class="item-mod">'+MODULES[it.module].emoji+' '+esc(MODULES[it.module].label)+'</span>' : '';
    return '<div class="item'+(isC?' checked':'')+'" role="checkbox" tabindex="0" '+
           'aria-checked="'+isC+'" data-id="'+esc(it.id)+'">'+
      '<span class="cb" aria-hidden="true">✓</span>'+
      '<div class="item-body">'+
        '<div class="item-line"><span class="item-name">'+esc(it.name)+'</span>'+
        (it.qty?'<span class="item-qty tnum">'+esc(it.qty)+'</span>':'')+mod+'</div>'+
        specs+
        (it.notes?'<div class="item-notes">'+esc(it.notes)+'</div>':'')+
      '</div></div>';
  }

  function groupHtml(title, items, showMod){
    var done = items.filter(function(it){ return checked[it.id]; }).length;
    var state = done===items.length ? "all" : (done>0 ? "some" : "");
    var mark = state==="all" ? "✓" : (state==="some" ? "–" : "✓");
    var ids = items.map(function(it){ return it.id; });
    return '<div class="group"><div class="group-head '+state+'" role="checkbox" tabindex="0" '+
        'aria-checked="'+(state==="all")+'" data-gids="'+esc(JSON.stringify(ids))+'" '+
        'aria-label="'+esc(T.selectAllAriaPrefix)+esc(title)+'">'+
        '<span class="cb" aria-hidden="true">'+mark+'</span>'+
        '<span class="group-title">'+esc(title)+'</span>'+
        '<span class="group-count tnum'+(state==="all"?' done':'')+'">'+done+'/'+items.length+'</span>'+
      '</div>'+
      items.map(function(it){ return itemHtml(it, showMod); }).join("")+
    '</div>';
  }

  function sectionHtml(sec, items, searching){
    if(!items.length && !(sec.key==="situational" && !searching)) return "";
    var done = items.filter(function(it){ return checked[it.id]; }).length;

    var body = "";
    if(sec.key==="situational"){
      // group by module, in module order
      MOD_ORDER.forEach(function(mk){
        var mi = items.filter(function(it){ return it.module===mk; });
        if(!mi.length) return;
        var m = MODULES[mk];
        body += groupHtml(m.emoji+" "+m.label, mi, false);
      });
      if(!body && !searching){
        body = '<div class="hint-strip">'+esc(sec.desc||"")+'</div>';
      }
    }else{
      // preserve data.json order; group by first appearance
      var order=[], byG={};
      items.forEach(function(it){
        if(!byG[it.group]){ byG[it.group]=[]; order.push(it.group); }
        byG[it.group].push(it);
      });
      order.forEach(function(g){ body += groupHtml(g, byG[g], false); });
    }
    if(!body) return "";

    var countHtml = items.length
      ? '<span class="sec-count tnum'+(done===items.length?' done':'')+'">'+done+'/'+items.length+'</span>' : '';
    return '<div class="section">'+
      '<div class="sec-head"><span class="sec-title">'+sec.emoji+' '+esc(sec.label)+'</span>'+countHtml+'</div>'+
      (sec.desc && sec.key!=="situational" ? '<div class="sec-desc">'+esc(sec.desc)+'</div>' : '')+
      body+'</div>';
  }

  function renderChips(){
    var html = "";
    MOD_ORDER.forEach(function(k){
      var m = MODULES[k];
      var n = ITEMS.filter(function(it){ return it.module===k; }).length;
      html += '<button class="chip" data-mod="'+k+'" aria-pressed="'+!!activeMods[k]+'">'+
              m.emoji+' '+esc(m.label)+' <span class="n tnum">'+n+'</span></button>';
    });
    document.getElementById("modChips").innerHTML = html;
  }

  function render(){
    renderChips();
    var searching = !!query.trim();
    var vis = visibleItems();

    var done = vis.filter(function(it){ return checked[it.id]; }).length;
    document.getElementById("barFill").style.width = vis.length ? (100*done/vis.length)+"%" : "0";
    document.getElementById("progLabel").innerHTML = vis.length
      ? (done===vis.length ? T.progressDoneLabel
         : T.progressTemplate.replace("{done}", done).replace("{total}", vis.length))
      : "—";

    var html = "";
    SECTIONS.forEach(function(sec){
      var si = vis.filter(function(it){ return it.sec===sec.key; });
      html += sectionHtml(sec, si, searching);
    });
    document.getElementById("list").innerHTML =
      html || '<div class="empty">'+esc(T.emptyState)+'</div>';
  }

  // ---- interactions (event delegation; state is display-only, never written back) ----
  function toggleItem(id){
    if(checked[id]) delete checked[id]; else checked[id]=true;
    saveChecked(); render();
  }
  function toggleGroup(ids){
    var allDone = ids.every(function(id){ return checked[id]; });
    ids.forEach(function(id){ if(allDone) delete checked[id]; else checked[id]=true; });
    saveChecked(); render();
  }
  function onActivate(el){
    var g = el.closest(".group-head");
    if(g){ toggleGroup(JSON.parse(g.getAttribute("data-gids"))); return; }
    var it = el.closest(".item");
    if(it) toggleItem(it.getAttribute("data-id"));
  }
  var list = document.getElementById("list");
  list.addEventListener("click", function(e){ onActivate(e.target); });
  list.addEventListener("keydown", function(e){
    if(e.key===" "||e.key==="Enter"){
      var t=e.target.closest("[role=checkbox]");
      if(t){ e.preventDefault(); onActivate(t); }
    }
  });

  document.getElementById("modChips").addEventListener("click", function(e){
    var b=e.target.closest(".chip"); if(!b) return;
    var k=b.getAttribute("data-mod");
    if(activeMods[k]) delete activeMods[k]; else activeMods[k]=true;
    saveMods(); render();
  });

  document.getElementById("search").addEventListener("input", function(e){
    query=e.target.value; render();
  });

  document.getElementById("resetBtn").addEventListener("click", function(){
    if(!confirm(T.resetConfirm)) return;
    checked={}; saveChecked(); render();
  });

  render();
})();
</script>
